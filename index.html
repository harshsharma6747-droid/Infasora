<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>G-GHOST OMNI-REAPER</title>
    <style>
        :root { --glow: #bc13fe; --bg: #050505; --cyan: #00f2ff; --shadow: #444; }
        body { background: var(--bg); color: white; font-family: 'Courier New', monospace; margin: 0; padding: 15px; overflow-x: hidden; }
        
        .header { text-align: center; color: var(--glow); font-size: 1.4rem; text-shadow: 0 0 10px var(--glow); margin-bottom: 20px; border-bottom: 1px solid #222; padding-bottom: 10px; }
        
        /* Stats & Pulse */
        .stat-bar { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-bottom: 15px; }
        .stat-box { background: #111; padding: 10px; border-radius: 8px; border: 1px solid #222; text-align: center; font-size: 10px; }
        .stat-val { display: block; font-size: 16px; font-weight: bold; margin-top: 4px; }
        
        /* Main Feed */
        .section-title { font-size: 12px; color: var(--glow); margin: 20px 0 10px; display: flex; justify-content: space-between; align-items: center; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); gap: 10px; }
        .card { background: #111; border: 1px solid #222; border-radius: 8px; overflow: hidden; position: relative; }
        .card img { width: 100%; display: block; opacity: 0.6; transition: 0.3s; }
        .card.active { border-color: var(--cyan); box-shadow: 0 0 8px rgba(0, 242, 255, 0.2); }
        .card.active img { opacity: 1; }
        
        /* Shadow Bucket */
        .shadow-bucket { background: #0a0a0a; border: 1px dashed var(--shadow); border-radius: 12px; padding: 15px; margin-top: 30px; }
        .shadow-card { display: flex; align-items: center; background: #111; margin-bottom: 8px; padding: 8px; border-radius: 6px; border-left: 3px solid var(--shadow); }
        .shadow-card img { width: 50px; height: 50px; object-fit: cover; border-radius: 4px; margin-right: 12px; }
        .shadow-info { flex: 1; font-size: 10px; overflow: hidden; }
        
        /* Controls */
        .controls { position: fixed; bottom: 20px; left: 20px; right: 20px; z-index: 1000; }
        .btn { width: 100%; padding: 15px; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; font-family: monospace; transition: 0.2s; box-shadow: 0 5px 15px rgba(0,0,0,0.5); }
        .btn-auto { background: var(--glow); color: #000; }
        .btn-auto.active { background: #00ff00; box-shadow: 0 0 20px rgba(0,255,0,0.4); }
        .btn-manual { background: var(--shadow); color: white; margin-top: 8px; font-size: 11px; }

        #log { font-size: 9px; color: #666; text-align: center; margin-top: 10px; height: 12px; }
        .badge { font-size: 9px; background: #222; padding: 2px 5px; border-radius: 4px; }
    </style>
</head>
<body>

<div class="header">🛰️ OMNI-REAPER V74</div>

<div class="stat-bar">
    <div class="stat-box">VAULTED<span class="stat-val" id="count-vault">0</span></div>
    <div class="stat-box" style="color:var(--cyan)">HARVESTED<span class="stat-val" id="count-dl">0</span></div>
    <div class="stat-box" style="color:var(--shadow)">SHADOW<span class="stat-val" id="count-shadow">0</span></div>
</div>

<div class="section-title">ACTIVE HARVEST QUEUE <span class="badge" id="sync-status">IDLE</span></div>
<div class="grid" id="activeGrid"></div>

<div class="shadow-bucket">
    <div class="section-title" style="color:var(--shadow); margin-top:0;">SHADOW BUCKET (MANUAL REVIEW)</div>
    <div id="shadowList"></div>
</div>

<div id="log">INITIALIZING NEBULA PROTOCOL...</div>

<div class="controls">
    <button class="btn btn-auto" id="autoBtn" onclick="toggleAuto()">START AUTO-REAPER</button>
    <button class="btn btn-manual" onclick="refresh()">FORCE SYNC DATA</button>
</div>

<script>
    const CONFIG = {
        FB_BASE: "https://bomb-aa638-default-rtdb.firebaseio.com/sora_vault/assets",
        LOCAL_KEY: "G_GHOST_HARVESTED_V1"
    };

    let vault = [];
    let harvested = JSON.parse(localStorage.getItem(CONFIG.LOCAL_KEY) || "[]");
    let isAuto = false;
    let isProcessing = false;

    // Refresh & Sync
    async function refresh() {
        const logEl = document.getElementById('log');
        document.getElementById('sync-status').innerText = "SYNCING...";
        
        try {
            const res = await fetch(`${CONFIG.FB_BASE}.json?nocache=${Date.now()}`);
            const data = await res.json();
            vault = data ? Object.values(data) : [];
            render();
            logEl.innerText = "DATABASE SYNCED // SCANNING FOR NEW ASSETS";
            document.getElementById('sync-status').innerText = "LIVE";
        } catch(e) {
            logEl.innerText = "SYNC FAILED // CHECK CONNECTION";
        }
    }

    function render() {
        const activeGrid = document.getElementById('activeGrid');
        const shadowList = document.getElementById('shadowList');
        activeGrid.innerHTML = '';
        shadowList.innerHTML = '';

        let shadowCount = 0;
        let dlCount = 0;

        vault.forEach(item => {
            const isDownloaded = harvested.includes(item.url);
            
            if (!isDownloaded) {
                // If it exists but hasn't been downloaded, it's in the Active Queue
                const card = document.createElement('div');
                card.className = 'card active';
                card.innerHTML = `<img src="${item.thumb || ''}" onerror="this.src='https://via.placeholder.com/150/111/bc13fe?text=NO+THUMB'">`;
                activeGrid.appendChild(card);
            } else {
                dlCount++;
            }

            // Populate Shadow Bucket with items that might need manual intervention or re-download
            const shadowCard = document.createElement('div');
            shadowCard.className = 'shadow-card';
            shadowCard.innerHTML = `
                <img src="${item.thumb || ''}">
                <div class="shadow-info">
                    ID: ${item.url.slice(-8)}...<br>
                    ${isDownloaded ? '<span style="color:var(--cyan)">[REAPED]</span>' : '<span style="color:var(--shadow)">[PENDING]</span>'}
                </div>
                <button onclick="manualDL('${item.thumb}', '${item.url}')" style="background:none; border:1px solid #333; color:white; font-size:9px; padding:5px;">DL</button>
            `;
            shadowList.appendChild(shadowCard);
            if (!isDownloaded) shadowCount++;
        });

        document.getElementById('count-vault').innerText = vault.length;
        document.getElementById('count-dl').innerText = dlCount;
        document.getElementById('count-shadow').innerText = shadowCount;
    }

    async function toggleAuto() {
        isAuto = !isAuto;
        const btn = document.getElementById('autoBtn');
        btn.innerText = isAuto ? "REAPER ACTIVE" : "START AUTO-REAPER";
        btn.classList.toggle('active', isAuto);
        if (isAuto) reaperLoop();
    }

    async function reaperLoop() {
        if (!isAuto || isProcessing) return;
        isProcessing = true;

        // Find the first non-downloaded item
        const target = vault.find(item => !harvested.includes(item.url));

        if (target && target.clean) {
            document.getElementById('log').innerText = `REAPING: ${target.url.slice(-8)}`;
            const success = await triggerDownload(target.clean, `Sora_${Date.now()}.mp4`);
            
            if (success) {
                harvested.push(target.url);
                localStorage.setItem(CONFIG.LOCAL_KEY, JSON.stringify(harvested));
                render();
            }
        }

        isProcessing = false;
        setTimeout(reaperLoop, 3000); // 3 second stagger for Android stability
    }

    async function triggerDownload(url, filename) {
        try {
            const res = await fetch(url);
            const blob = await res.blob();
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = filename;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(a.href);
            return true;
        } catch(e) {
            console.error("Download blocked or failed", e);
            return false;
        }
    }

    function manualDL(thumb, url) {
        const item = vault.find(i => i.url === url);
        if (item && item.clean) {
            triggerDownload(item.clean, `Manual_${Date.now()}.mp4`);
            if (!harvested.includes(url)) {
                harvested.push(url);
                localStorage.setItem(CONFIG.LOCAL_KEY, JSON.stringify(harvested));
                render();
            }
        } else {
            alert("Clean video link missing in Vault!");
        }
    }

    // Auto-Sync every 10 seconds
    setInterval(refresh, 10000);
    refresh();
</script>
</body>
</html>
