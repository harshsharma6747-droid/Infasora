<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>G-GHOST OMNI-SYNC V80</title>
    <style>
        :root { --glow: #bc13fe; --bg: #050505; --cyan: #00f2ff; --shadow: #ff4444; }
        body { background: var(--bg); color: white; font-family: 'Courier New', monospace; margin: 0; padding: 10px; padding-bottom: 200px; }
        
        /* UI Header */
        .header { text-align: center; color: var(--glow); font-size: 1.4rem; text-shadow: 0 0 10px var(--glow); padding: 15px 0; }
        .nav-tabs { display: grid; grid-template-columns: 1fr 1fr; gap: 5px; margin-bottom: 15px; }
        .tab { padding: 10px; text-align: center; background: #111; border: 1px solid #222; border-radius: 5px; cursor: pointer; font-size: 12px; }
        .tab.active { border-color: var(--glow); color: var(--glow); background: #1a1a1a; box-shadow: inset 0 0 10px rgba(188,19,254,0.2); }
        .tab.shadow-tab.active { border-color: var(--shadow); color: var(--shadow); }

        /* Stats Bar */
        .stats { display: flex; justify-content: space-between; background: #111; padding: 10px; border-radius: 8px; font-size: 10px; margin-bottom: 15px; border: 1px solid #222; }
        .stats span { color: var(--cyan); }

        /* Grid System */
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); gap: 8px; }
        .asset-card { background: #111; border: 1px solid #222; border-radius: 8px; overflow: hidden; position: relative; }
        .asset-card img { width: 100%; display: block; opacity: 0.8; }
        .asset-card.new { border-color: var(--cyan); }
        .asset-card.shadowed { border-color: var(--shadow); }
        .manual-dl { position: absolute; bottom: 5px; right: 5px; background: rgba(0,0,0,0.8); border: 1px solid var(--glow); color: var(--glow); padding: 4px; font-size: 9px; border-radius: 4px; }

        /* Floating Controls */
        .controls { position: fixed; bottom: 15px; left: 10px; right: 10px; background: rgba(10,10,10,0.95); border: 2px solid var(--glow); border-radius: 15px; padding: 15px; backdrop-filter: blur(10px); z-index: 1000; }
        .btn-group { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .btn { padding: 12px; border: none; font-weight: bold; border-radius: 8px; cursor: pointer; font-family: monospace; font-size: 11px; }
        .btn-start { background: var(--glow); color: #000; }
        .btn-stop { background: var(--shadow); color: #fff; }
        .btn-fld { background: #222; color: var(--cyan); border: 1px solid #444; }
        
        #log { font-size: 9px; color: #666; text-align: center; margin-top: 10px; height: 12px; overflow: hidden; }
        .hidden { display: none; }
    </style>
</head>
<body>

<div class="header">🛰️ OMNI-SYNC NEBULA</div>

<div class="nav-tabs">
    <div id="tab-live" class="tab active" onclick="switchTab('live')">LIVE FEED</div>
    <div id="tab-shadow" class="tab shadow-tab" onclick="switchTab('shadow')">SHADOW BUCKET</div>
</div>

<div class="stats">
    <div>VAULT: <span id="fld-name">DEFAULT</span></div>
    <div>LOGGED: <span id="count-sync">0</span></div>
    <div>SHADOW: <span id="count-shadow" style="color:var(--shadow)">0</span></div>
</div>

<div id="live-view" class="grid"></div>
<div id="shadow-view" class="grid hidden"></div>

<div class="controls">
    <div style="display:flex; gap:5px; margin-bottom:10px;">
        <input type="text" id="rename-tag" placeholder="Prefix..." style="flex:1; background:#000; border:1px solid #333; color:var(--cyan); padding:8px; border-radius:5px; font-size:12px;">
        <button class="btn btn-fld" onclick="changeFolder()">FOLDER</button>
    </div>
    <div class="btn-group">
        <button id="engine-toggle" class="btn btn-start" onclick="toggleEngine()">START AUTO-SYNC</button>
        <button class="btn btn-fld" onclick="refreshData()">FORCE REFRESH</button>
    </div>
    <div id="log">STANDBY // SYSTEM READY</div>
</div>

<script>
    const CONFIG = {
        FB_BASE: "https://bomb-aa638-default-rtdb.firebaseio.com/thumb_vault/assets",
        folder: localStorage.getItem('ghost_folder') || "default"
    };

    let vault = [];
    let history = JSON.parse(localStorage.getItem('ghost_history') || '[]');
    let shadow = JSON.parse(localStorage.getItem('ghost_shadow') || '[]');
    let isRunning = false;
    let currentTab = 'live';

    // 1. Sync & Refresh
    async function refreshData() {
        writeLog("POLLING FIREBASE...");
        try {
            const res = await fetch(`${CONFIG.FB_BASE}/${CONFIG.folder}.json?nocache=${Date.now()}`);
            const data = await res.json();
            vault = data ? Object.values(data) : [];
            processAssets();
        } catch(e) { writeLog("SYNC ERROR"); }
    }

    function processAssets() {
        const liveGrid = document.getElementById('live-view');
        const shadowGrid = document.getElementById('shadow-view');
        liveGrid.innerHTML = '';
        shadowGrid.innerHTML = '';

        let shadowCount = 0;
        let syncCount = 0;

        vault.forEach(item => {
            const isDownloaded = history.includes(item.id);
            const isShadowed = shadow.includes(item.id);

            const card = document.createElement('div');
            card.className = `asset-card ${isShadowed ? 'shadowed' : ''}`;
            card.innerHTML = `<img src="${item.thumb}">`;

            if (isShadowed) {
                card.innerHTML += `<div class="manual-dl" onclick="manualDL('${item.thumb}', '${item.id}')">MANUAL</div>`;
                shadowGrid.appendChild(card);
                shadowCount++;
            } else {
                if (!isDownloaded) card.classList.add('new');
                liveGrid.appendChild(card);
                if (isDownloaded) syncCount++;
            }
        });

        document.getElementById('count-sync').innerText = syncCount;
        document.getElementById('count-shadow').innerText = shadowCount;
        document.getElementById('fld-name').innerText = CONFIG.folder.toUpperCase();
    }

    // 2. The Auto-Engine
    async function toggleEngine() {
        isRunning = !isRunning;
        const btn = document.getElementById('engine-toggle');
        btn.innerText = isRunning ? "STOP AUTO-SYNC" : "START AUTO-SYNC";
        btn.className = isRunning ? "btn btn-stop" : "btn btn-start";
        if(isRunning) autoEngine();
    }

    async function autoEngine() {
        if(!isRunning) return;

        // Auto-Refresh check
        await refreshData();

        // Identify next target (In vault, not in history, not in shadow)
        const target = vault.find(item => !history.includes(item.id) && !shadow.includes(item.id));

        if(target) {
            writeLog(`DOWNLOADING: ${target.id}`);
            const success = await triggerDownload(target.thumb, target.id);
            
            if(success) {
                history.push(target.id);
                localStorage.setItem('ghost_history', JSON.stringify(history));
                writeLog(`SUCCESS: ${target.id}`);
            } else {
                shadow.push(target.id);
                localStorage.setItem('ghost_shadow', JSON.stringify(shadow));
                writeLog(`SHADOWED: ${target.id}`);
            }
            processAssets();
        } else {
            writeLog("QUEUE CLEAR // SLEEPING");
        }

        setTimeout(autoEngine, 4000);
    }

    // 3. Download Logic
    async function triggerDownload(url, id) {
        try {
            const prefix = document.getElementById('rename-tag').value || CONFIG.folder;
            const res = await fetch(url);
            const blob = await res.blob();
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = `${prefix}_${id}.jpg`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            return true;
        } catch(e) {
            return false;
        }
    }

    function manualDL(url, id) {
        triggerDownload(url, id);
        // Move from shadow to history after manual attempt
        shadow = shadow.filter(sid => sid !== id);
        history.push(id);
        localStorage.setItem('ghost_shadow', JSON.stringify(shadow));
        localStorage.setItem('ghost_history', JSON.stringify(history));
        processAssets();
    }

    // 4. Navigation & Utility
    function switchTab(t) {
        currentTab = t;
        document.getElementById('live-view').classList.toggle('hidden', t !== 'live');
        document.getElementById('shadow-view').classList.toggle('hidden', t !== 'shadow');
        document.getElementById('tab-live').classList.toggle('active', t === 'live');
        document.getElementById('tab-shadow').classList.toggle('active', t === 'shadow');
    }

    function changeFolder() {
        const n = prompt("Target Folder Name:", CONFIG.folder);
        if(n) {
            CONFIG.folder = n.replace(/[^a-z0-9]/gi, '_');
            localStorage.setItem('ghost_folder', CONFIG.folder);
            refreshData();
        }
    }

    function writeLog(m) { document.getElementById('log').innerText = `// ${m}`; }

    // Initial Start
    refreshData();
    // Auto-refresh every 30 seconds even if engine is off
    setInterval(refreshData, 30000);
</script>
</body>
</html>
